<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        var path = window.location.pathname.split('/');
        // If hostname contains github.io AND we aren't at the root, use the subfolder
        var isGitHubPages = window.location.hostname.includes('github.io');
        var baseHref = (isGitHubPages && path[1] === 'SpawnDev.ILGPU.ML') ? '/SpawnDev.ILGPU.ML/' : '/';
        document.write('<base href="' + baseHref + '" />');
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpawnDev.ILGPU.ML.Demo</title>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SpawnDev.ILGPU.ML.Demo.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
